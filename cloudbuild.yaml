steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - smart-receipt-organizer
      - --gen2
      - --runtime=python311
      - --region=southamerica-east1
      - --source=.
      - --entry-point=run
      - --trigger-http
      - --no-allow-unauthenticated
      - --set-env-vars
      - >-
          OPENAI_API_KEY=$$OPENAI_API_KEY,
          GCS_BUCKET_NAME=$$GCS_BUCKET_NAME,
          DRIVE_FOLDER_ID=$$DRIVE_FOLDER_ID,
          OAUTH_CREDENTIALS_FILE=oauth-credentials.json,
          OAUTH_TOKEN_FILE=oauth-token.json
      - --memory=256Mi
      - --timeout=120s
    secretEnv:
      - OPENAI_API_KEY
      - GCS_BUCKET_NAME
      - DRIVE_FOLDER_ID

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/OPENAI_API_KEY/versions/latest
      env: OPENAI_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/GCS_BUCKET_NAME/versions/latest
      env: GCS_BUCKET_NAME
    - versionName: projects/$PROJECT_ID/secrets/DRIVE_FOLDER_ID/versions/latest
      env: DRIVE_FOLDER_ID